<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Church Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #map { width: 100%; height: 100vh; }
    #search-bar { position: absolute; top: 18px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; border-radius: 50px; box-shadow: 0 4px 24px rgba(0,0,0,0.18); padding: 8px 10px 8px 18px; display: flex; align-items: center; gap: 8px; min-width: 340px; max-width: 92vw; }
    #search-bar .logo { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; color: #1a1815; white-space: nowrap; flex-shrink: 0; }
    #search-bar .divider { width: 1px; height: 18px; background: #e8e4de; flex-shrink: 0; }
    #zipInput { border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: #2a2825; background: transparent; width: 110px; }
    #zipInput::placeholder { color: #bbb; }
    #radiusSelect { border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: #6b6762; background: transparent; cursor: pointer; flex-shrink: 0; }
    #searchBtn { background: #2a2825; color: white; border: none; border-radius: 50px; padding: 7px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: background 0.2s; }
    #searchBtn:hover { background: #b8955a; }
    #clearBtn { background: none; border: none; color: #bbb; font-size: 1rem; cursor: pointer; flex-shrink: 0; line-height: 1; padding: 2px 4px; border-radius: 50%; transition: color 0.2s; display: none; }
    #clearBtn:hover { color: #2a2825; }
    #clearBtn.visible { display: block; }
    #result-pill { position: absolute; top: 72px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(26,24,21,0.78); color: white; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 500; padding: 5px 14px; border-radius: 50px; white-space: nowrap; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    #result-pill.show { opacity: 1; }
    .leaflet-popup-content-wrapper { border-radius: 12px !important; box-shadow: 0 6px 32px rgba(0,0,0,0.16) !important; padding: 0 !important; overflow: hidden !important; }
    .leaflet-popup-content { margin: 0 !important; min-width: 220px !important; max-width: 260px !important; }
    .leaflet-popup-tip-container { margin-top: -1px !important; }
    .popup-inner { padding: 14px 16px 12px; font-family: 'DM Sans', sans-serif; }
    .popup-denom { font-size: 0.62rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: #b8955a; margin-bottom: 3px; }
    .popup-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600; color: #1a1815; line-height: 1.25; margin-bottom: 8px; }
    .popup-row { font-size: 0.78rem; color: #6b6762; line-height: 1.5; margin-bottom: 2px; }
