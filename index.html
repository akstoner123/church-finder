<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
#cf-root, #cf-root * { all: unset !important; box-sizing: border-box !important; }

#cf-root {
  display: flex !important;
  flex-direction: row !important;
  width: 100% !important;
  height: 100vh !important;
  background: #faf8f5 !important;
  font-family: 'DM Sans', sans-serif !important;
  overflow: hidden !important;
  position: relative !important;
}

/* ── SIDEBAR ── */
#cf-sidebar {
  width: 360px !important;
  flex-shrink: 0 !important;
  background: #fff !important;
  border-right: 1px solid #e8e4de !important;
  display: flex !important;
  flex-direction: column !important;
  height: 100vh !important;
  overflow: hidden !important;
}

#cf-top {
  padding: 1rem !important;
  border-bottom: 1px solid #e8e4de !important;
  flex-shrink: 0 !important;
  display: block !important;
  background: #fff !important;
}

.cf-logo {
  font-family: 'Cormorant Garamond', serif !important;
  font-size: 1.3rem !important;
  font-weight: 600 !important;
  color: #1a1815 !important;
  display: block !important;
  margin-bottom: 0.8rem !important;
  line-height: 1.3 !important;
}

.cf-label {
  font-size: 0.67rem !important;
  font-weight: 500 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.1em !important;
  color: #9e9790 !important;
  display: block !important;
  margin-bottom: 0.4rem !important;
}

.cf-row {
  display: flex !important;
  flex-direction: row !important;
  gap: 6px !important;
  align-items: center !important;
  margin-bottom: 0.5rem !important;
}

.cf-zip {
  flex: 1 !important;
  min-width: 0 !important;
  border: 1.5px solid #e8e4de !important;
  border-radius: 8px !important;
  padding: 0.58rem 0.8rem !important;
  font-family: 'DM Sans', sans-serif !important;
  font-size: 0.9rem !important;
  color: #2a2825 !important;
  background: #faf8f5 !important;
  outline: none !important;
  display: block !important;
}

.cf-sbtn {
  flex-shrink: 0 !important;
  background: #2a2825 !important;
  color: #fff !important;
  border: none !important;
  border-radius: 8px !important;
  padding: 0.58rem 1rem !important;
  font-family: 'DM Sans', sans-serif !important;
  font-size: 0.82rem !important;
  font-weight: 500 !important;
  cursor: pointer !important;
  white-space: nowrap !important;
  display: block !important;
  line-height: 1 !important;
}

.cf-sel {
  flex: 1 !important;
  min-width: 0 !important;
  border: 1.5px solid #e8e4de !important;
  border-radius: 6px !important;
  padding: 0.3rem 0.4rem !important;
  font-family: 'DM Sans', sans-serif !important;
  font-size: 0.76rem !important;
  background: #faf8f5 !important;
  color: #2a2825 !important;
  outline: none !important;
  cursor: pointer !important;
  display: block !important;
}

.cf-clr {
  flex-shrink: 0 !important;
  font-size: 0.7rem !important;
  color: #9e9790 !important;
  background: none !important;
  border: none !important;
  cursor: pointer !important;
  white-space: nowrap !important;
  display: block !important;
  padding: 0 !important;
  line-height: 1 !important;
}

#cf-hdr {
  padding: 0.75rem 1rem 0.3rem !important;
  font-size: 0.68rem !important;
  font-weight: 500 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.08em !important;
  color: #9e9790 !important;
  display: block !important;
  flex-shrink: 0 !important;
  background: #fff !important;
}

#cf-list {
  flex: 1 !important;
  overflow-y: auto !important;
  padding: 0.4rem 0.65rem 1rem !important;
  display: block !important;
  min-height: 0 !important;
}
#cf-list::-webkit-scrollbar { width: 3px !important; }
#cf-list::-webkit-scrollbar-thumb { background: #e8e4de !important; border-radius: 2px !important; }

/* ── CARD — info only, no buttons ── */
.cfc {
  background: #fff !important;
  border: 1.5px solid #e8e4de !important;
  border-radius: 10px !important;
  padding: 0.85rem 0.9rem !important;
  margin-bottom: 0.45rem !important;
  display: block !important;
  position: relative !important;
  cursor: pointer !important;
  transition: border-color 0.15s, background 0.15s !important;
}

.cfc-dist {
  position: absolute !important;
  top: 0.75rem !important;
  right: 0.75rem !important;
  font-size: 0.64rem !important;
  font-weight: 500 !important;
  color: #4a7fa5 !important;
  background: #eef4f9 !important;
  padding: 0.1rem 0.38rem !important;
  border-radius: 20px !important;
  white-space: nowrap !important;
  display: block !important;
  line-height: 1.4 !important;
}

.cfc-name {
  font-family: 'Cormorant Garamond', serif !important;
  font-size: 1rem !important;
  font-weight: 600 !important;
  color: #1a1815 !important;
  line-height: 1.25 !important;
  padding-right: 3rem !important;
  margin-bottom: 0.1rem !important;
  display: block !important;
}

.cfc-denom {
  font-size: 0.64rem !important;
  font-weight: 500 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.07em !important;
  color: #b8955a !important;
  margin-bottom: 0.22rem !important;
  display: block !important;
  line-height: 1.4 !important;
}

.cfc-addr {
  font-size: 0.76rem !important;
  color: #9e9790 !important;
  line-height: 1.4 !important;
  display: block !important;
}

.cfc-hint {
  font-size: 0.67rem !important;
  color: #c8c4be !important;
  display: block !important;
  margin-top: 0.35rem !important;
  line-height: 1 !important;
}

/* ── MAP ── */
#cf-map-wrap {
  flex: 1 !important;
  height: 100vh !important;
  display: block !important;
  min-width: 0 !important;
}
#cf-map {
  width: 100% !important;
  height: 100% !important;
  display: block !important;
}

/* ── POPUP MODAL ── */
#cf-modal-bg {
  display: none !important;
  position: fixed !important;
  inset: 0 !important;
  background: rgba(26,24,21,0.5) !important;
  z-index: 9998 !important;
  align-items: center !important;
  justify-content: center !important;
}
#cf-modal-bg.open { display: flex !important; }

#cf-modal {
  background: #fff !important;
  border-radius: 14px !important;
  padding: 1.75rem !important;
  width: 420px !important;
  max-width: 92vw !important;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18) !important;
  position: relative !important;
  display: block !important;
  animation: cfModalIn 0.2s ease !important;
}
@keyframes cfModalIn {
  from { opacity: 0; transform: translateY(12px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

#cf-modal-close {
  position: absolute !important;
  top: 1rem !important;
  right: 1rem !important;
  background: #f0f0ec !important;
  border: none !important;
  border-radius: 50% !important;
  width: 28px !important;
  height: 28px !important;
  font-size: 1rem !important;
  cursor: pointer !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  color: #2a2825 !important;
  line-height: 1 !important;
}

#cf-modal-name {
  font-family: 'Cormorant Garamond', serif !important;
  font-size: 1.4rem !important;
  font-weight: 600 !important;
  color: #1a1815 !important;
  display: block !important;
  margin-bottom: 0.2rem !important;
  padding-right: 2rem !important;
  line-height: 1.3 !important;
}
#cf-modal-denom {
  font-size: 0.7rem !important;
  font-weight: 500 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.08em !important;
  color: #b8955a !important;
  display: block !important;
  margin-bottom: 0.9rem !important;
}
.cf-modal-row {
  display: block !important;
  font-size: 0.85rem !important;
  color: #6b6762 !important;
  margin-bottom: 0.45rem !important;
  line-height: 1.5 !important;
}
.cf-modal-row a {
  color: #4a7fa5 !important;
  text-decoration: none !important;
  font-weight: 500 !important;
  display: inline !important;
}
#cf-modal-divider {
  display: block !important;
  border: none !important;
  border-top: 1px solid #e8e4de !important;
  margin: 1rem 0 !important;
}
#cf-modal-dir {
  display: block !important;
  width: 100% !important;
  text-align: center !important;
  background: #2a2825 !important;
  color: #fff !important;
  border: none !important;
  border-radius: 8px !important;
  padding: 0.7rem !important;
  font-family: 'DM Sans', sans-serif !important;
  font-size: 0.88rem !important;
  font-weight: 500 !important;
  cursor: pointer !important;
  text-decoration: none !important;
  margin-bottom: 0.5rem !important;
  line-height: 1.4 !important;
}
#cf-modal-map {
  display: block !important;
  width: 100% !important;
  text-align: center !important;
  background: #eef4f9 !important;
  color: #4a7fa5 !important;
  border: none !important;
  border-radius: 8px !important;
  padding: 0.7rem !important;
  font-family: 'DM Sans', sans-serif !important;
  font-size: 0.88rem !important;
  font-weight: 500 !important;
  cursor: pointer !important;
  line-height: 1.4 !important;
}

/* ── STATES ── */
.cf-loading, .cf-empty {
  text-align: center !important;
  padding: 2.5rem 1rem !important;
  color: #9e9790 !important;
  display: block !important;
}
.cf-spinner {
  width: 28px !important; height: 28px !important;
  border: 3px solid #e8e4de !important;
  border-top-color: #b8955a !important;
  border-radius: 50% !important;
  animation: cfspin 0.8s linear infinite !important;
  margin: 0 auto 0.7rem !important;
  display: block !important;
}
@keyframes cfspin { to { transform: rotate(360deg); } }
.cf-empty-p { font-size: 0.82rem !important; line-height: 1.65 !important; display: block !important; color: #9e9790 !important; }
.cf-try {
  display: block !important;
  margin: 0.8rem auto 0 !important;
  background: #2a2825 !important;
  color: white !important;
  border: none !important;
  border-radius: 7px !important;
  padding: 0.48rem 0.95rem !important;
  font-family: 'DM Sans', sans-serif !important;
  font-size: 0.77rem !important;
  font-weight: 500 !important;
  cursor: pointer !important;
  line-height: 1 !important;
  width: auto !important;
}

#cf-toast {
  position: fixed !important;
  bottom: 1.5rem !important; right: 1.5rem !important;
  background: #1a1815 !important;
  color: white !important;
  padding: 0.65rem 1.1rem !important;
  border-radius: 8px !important;
  font-family: 'DM Sans', sans-serif !important;
  font-size: 0.83rem !important;
  z-index: 9999 !important;
  opacity: 0 !important;
  transition: opacity 0.25s !important;
  pointer-events: none !important;
  display: block !important;
  line-height: 1.4 !important;
}
#cf-toast.show { opacity: 1 !important; }

@media (max-width: 680px) {
  #cf-root { flex-direction: column !important; height: auto !important; }
  #cf-sidebar { width: 100% !important; height: 55vh !important; }
  #cf-map-wrap { height: 45vh !important; }
}
</style>
</head>
<body>

<div id="cf-root">
  <div id="cf-sidebar">
    <div id="cf-top">
      <span class="cf-logo">&#x26EA; Church Finder</span>
      <span class="cf-label">Search by ZIP Code</span>
      <div class="cf-row">
        <input class="cf-zip" id="cfZip" type="text" placeholder="e.g. 02898" maxlength="5">
        <button class="cf-sbtn" onclick="cfSearch()">Search</button>
      </div>
      <div class="cf-row">
        <select class="cf-sel" id="cfRadius">
          <option value="5">5 miles</option>
          <option value="10" selected>10 miles</option>
          <option value="25">25 miles</option>
          <option value="50">50 miles</option>
        </select>
        <select class="cf-sel" id="cfDenom" onchange="cfApply()">
          <option value="">All denominations</option>
        </select>
        <button class="cf-clr" onclick="cfClear()">&#x2715; Clear</button>
      </div>
    </div>
    <span id="cf-hdr">All Churches</span>
    <div id="cf-list">
      <div class="cf-loading"><div class="cf-spinner"></div><span class="cf-empty-p">Loading churches&hellip;</span></div>
    </div>
  </div>
  <div id="cf-map-wrap"><div id="cf-map"></div></div>
</div>

<!-- MODAL -->
<div id="cf-modal-bg" onclick="cfCloseModal(event)">
  <div id="cf-modal">
    <button id="cf-modal-close" onclick="cfCloseModal()">&#x2715;</button>
    <span id="cf-modal-name"></span>
    <span id="cf-modal-denom"></span>
    <span class="cf-modal-row" id="cf-modal-addr"></span>
    <span class="cf-modal-row" id="cf-modal-phone"></span>
    <span class="cf-modal-row" id="cf-modal-times"></span>
    <span class="cf-modal-row" id="cf-modal-web"></span>
    <span id="cf-modal-divider"></span>
    <a id="cf-modal-dir" href="#" target="_blank">&#x1F5FA; Get Directions</a>
    <button id="cf-modal-map" onclick="cfModalShowMap()">&#x1F4CD; Show on Map</button>
  </div>
</div>

<div id="cf-toast"></div>

<script>
const CF_API = 'https://script.google.com/macros/s/AKfycbz4WWfiJCPMbc9ZMidVBmjgQmE_0Wiy9eJPzpjH4-n7_ZE4J_Xsvvv_JgqbQ8wVVRhy8g/exec';
let cfAll = [], cfMap, cfMarkers = [], cfCircle = null, cfLast = null, cfActiveId = null;

const cfT = s => s ? s.replace(/\w\S*/g, w => w[0].toUpperCase() + w.slice(1).toLowerCase()) : '';

// ── LOAD ──
async function cfLoad() {
  try {
    const r = await fetch(CF_API + '?action=getAll');
    const d = await r.json();
    cfAll = (d.churches || []).map(c => ({ ...c, lat: parseFloat(c.lat)||null, lng: parseFloat(c.lng)||null, id: String(c.id) }));
    cfPopDenoms();
    cfShowAll();
  } catch(e) {
    document.getElementById('cf-list').innerHTML = '<div class="cf-empty"><span class="cf-empty-p">Could not load churches. Please refresh.</span></div>';
  }
}

function cfPopDenoms() {
  const ds = [...new Set(cfAll.map(c => c.denom).filter(Boolean))].sort();
  document.getElementById('cfDenom').innerHTML = '<option value="">All denominations</option>' + ds.map(d => '<option value="' + d + '">' + d + '</option>').join('');
}

function cfFiltered(list) {
  const d = document.getElementById('cfDenom').value;
  return d ? list.filter(c => c.denom === d) : list;
}

function cfApply() {
  if (cfLast) {
    const r = parseFloat(document.getElementById('cfRadius').value);
    const nearby = cfAll.filter(c => c.lat && c.lng)
      .map(c => ({ ...c, dist: cfHav(cfLast.lat, cfLast.lng, c.lat, c.lng) }))
      .filter(c => c.dist <= r).sort((a,b) => a.dist - b.dist);
    const f = cfFiltered(nearby);
    cfCards(f, true); cfPins(f);
    document.getElementById('cf-hdr').textContent = f.length + ' church' + (f.length !== 1 ? 'es' : '') + ' within ' + r + ' mi';
  } else { cfShowAll(); }
}

// ── MAP ──
function cfInitMap() {
  cfMap = L.map('cf-map').setView([37.5, -96], 4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19 }).addTo(cfMap);
  cfLoad();
}

const cfIcon = L.divIcon({ html: '<div style="background:#2a2825;color:white;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,0.3);border:2px solid #b8955a;">&#x26EA;</div>', className:'', iconSize:[32,32], iconAnchor:[16,16], popupAnchor:[0,-18] });

function cfPins(list) {
  cfMarkers.forEach(m => cfMap.removeLayer(m)); cfMarkers = [];
  list.forEach(c => {
    if (!c.lat || !c.lng) return;
    const du = 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(c.address + ', ' + c.city + ', ' + c.state + ' ' + c.zip);
    const pop = '<div style="min-width:180px;font-family:sans-serif">' +
      '<b style="font-size:14px;color:#1a1815;display:block;margin-bottom:2px">' + cfT(c.name) + '</b>' +
      (c.denom ? '<span style="font-size:10px;text-transform:uppercase;color:#b8955a;display:block;margin-bottom:4px">' + c.denom + '</span>' : '') +
      '<span style="font-size:12px;color:#9e9790;display:block">' + cfT(c.address) + ', ' + cfT(c.city) + ', ' + c.state + ' ' + c.zip + '</span>' +
      (c.phone ? '<span style="font-size:12px;color:#9e9790;display:block;margin-top:2px">&#x1F4DE; ' + c.phone + '</span>' : '') +
      (c.times ? '<span style="font-size:12px;color:#9e9790;display:block;margin-top:2px">&#x1F550; ' + c.times + '</span>' : '') +
      (c.website ? '<a href="' + c.website + '" target="_blank" style="font-size:12px;color:#4a7fa5;display:block;margin-top:2px">&#x1F310; Website</a>' : '') +
      '<a href="' + du + '" target="_blank" style="display:block;margin-top:8px;background:#2a2825;color:white;border-radius:6px;padding:5px 10px;font-size:12px;font-weight:500;text-decoration:none;text-align:center">&#x1F5FA; Get Directions</a>' +
      '</div>';
    const m = L.marker([c.lat, c.lng], { icon: cfIcon }).addTo(cfMap).bindPopup(pop);
    m.cfId = c.id; m.on('click', () => cfHL(c.id)); cfMarkers.push(m);
  });
}

// ── CARDS ── simple info only, no buttons
function cfCards(list, withDist) {
  const el = document.getElementById('cf-list');
  if (!list.length) {
    const r = parseFloat(document.getElementById('cfRadius').value);
    const btn = cfLast && r < 50 ? '<button class="cf-try" onclick="cfWider()">Try a wider radius</button>' : '';
    el.innerHTML = '<div class="cf-empty"><span class="cf-empty-p">No churches found in this area.</span>' + btn + '</div>';
    return;
  }
  let h = '';
  for (let i = 0; i < list.length; i++) {
    const c = list[i];
    h += '<div class="cfc" id="cfc-' + c.id + '" onclick="cfOpenModal(\'' + c.id + '\')">';
    if (withDist && c.dist != null) h += '<span class="cfc-dist">' + c.dist.toFixed(1) + ' mi</span>';
    h += '<span class="cfc-name">' + cfT(c.name) + '</span>';
    if (c.denom) h += '<span class="cfc-denom">' + c.denom + '</span>';
    h += '<span class="cfc-addr">' + cfT(c.address) + ', ' + cfT(c.city) + ', ' + c.state + ' ' + c.zip + '</span>';
    if (c.phone) h += '<span class="cfc-addr">&#x1F4DE; ' + c.phone + '</span>';
    h += '<span class="cfc-hint">Tap for details &amp; directions ›</span>';
    h += '</div>';
  }
  el.innerHTML = h;
}

// ── MODAL ──
function cfOpenModal(id) {
  const c = cfAll.find(x => x.id === id);
  if (!c) return;
  cfActiveId = id;
  const du = 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(c.address + ', ' + c.city + ', ' + c.state + ' ' + c.zip);

  document.getElementById('cf-modal-name').textContent = cfT(c.name);
  document.getElementById('cf-modal-denom').textContent = c.denom || '';
  document.getElementById('cf-modal-denom').style.display = c.denom ? 'block' : 'none';
  document.getElementById('cf-modal-addr').textContent = '📍 ' + cfT(c.address) + ', ' + cfT(c.city) + ', ' + c.state + ' ' + c.zip;
  document.getElementById('cf-modal-phone').textContent = c.phone ? '📞 ' + c.phone : '';
  document.getElementById('cf-modal-phone').style.display = c.phone ? 'block' : 'none';
  document.getElementById('cf-modal-times').textContent = c.times ? '🕐 ' + c.times : '';
  document.getElementById('cf-modal-times').style.display = c.times ? 'block' : 'none';

  const webEl = document.getElementById('cf-modal-web');
  if (c.website) {
    webEl.innerHTML = '🌐 <a href="' + c.website + '" target="_blank" style="color:#4a7fa5;text-decoration:none;font-weight:500;display:inline">' + c.website.replace(/^https?:\/\/(www\.)?/,'') + '</a>';
    webEl.style.display = 'block';
  } else {
    webEl.style.display = 'none';
  }

  document.getElementById('cf-modal-dir').href = du;
  document.getElementById('cf-modal-bg').classList.add('open');

  // Also highlight on map
  cfHL(id);
}

function cfCloseModal(e) {
  if (!e || e.target === document.getElementById('cf-modal-bg') || e.currentTarget === document.getElementById('cf-modal-close')) {
    document.getElementById('cf-modal-bg').classList.remove('open');
  }
}

function cfModalShowMap() {
  document.getElementById('cf-modal-bg').classList.remove('open');
  if (cfActiveId) {
    const m = cfMarkers.find(m => m.cfId === cfActiveId);
    if (m) { cfMap.setView(m.getLatLng(), 15); m.openPopup(); }
  }
}

function cfHL(id) {
  document.querySelectorAll('.cfc').forEach(c => { c.style.borderColor = '#e8e4de'; c.style.background = '#ffffff'; });
  const card = document.getElementById('cfc-' + id);
  if (card) { card.style.borderColor = '#4a7fa5'; card.style.background = '#f5f9fd'; card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

function cfWider() {
  const sel = document.getElementById('cfRadius');
  const next = Array.from(sel.options).map(o => parseFloat(o.value)).find(v => v > parseFloat(sel.value));
  if (next) { sel.value = next; cfSearch(); }
}

function cfShowAll() {
  const f = cfFiltered(cfAll);
  cfCards(f); cfPins(f);
  const p = f.filter(c => c.lat && c.lng);
  if (p.length > 1) cfMap.fitBounds(L.latLngBounds(p.map(c => [c.lat, c.lng])).pad(0.2));
  else if (p.length === 1) cfMap.setView([p[0].lat, p[0].lng], 13);
  document.getElementById('cf-hdr').textContent = 'All Churches (' + f.length + ')';
  cfLast = null;
}

async function cfSearch() {
  const zip = document.getElementById('cfZip').value.trim();
  if (!/^\d{5}$/.test(zip)) { cfToast('Please enter a valid 5-digit ZIP code'); return; }
  const radius = parseFloat(document.getElementById('cfRadius').value);
  cfToast('Searching\u2026');
  try {
    const res = await fetch('https://nominatim.openstreetmap.org/search?postalcode=' + zip + '&country=US&format=json');
    const data = await res.json();
    if (!data.length) { cfToast('ZIP code not found'); return; }
    const center = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
    cfLast = center;
    if (cfCircle) cfMap.removeLayer(cfCircle);
    cfCircle = L.circle([center.lat, center.lng], { radius: radius * 1609.34, color: '#b8955a', fillColor: '#b8955a', fillOpacity: 0.05, weight: 1.5, dashArray: '5,5' }).addTo(cfMap);
    const nearby = cfAll.filter(c => c.lat && c.lng)
      .map(c => ({ ...c, dist: cfHav(center.lat, center.lng, c.lat, c.lng) }))
      .filter(c => c.dist <= radius).sort((a,b) => a.dist - b.dist);
    const f = cfFiltered(nearby);
    cfCards(f, true); cfPins(f);
    if (f.length) cfMap.fitBounds(L.latLngBounds(f.map(c => [c.lat, c.lng])).pad(0.3));
    else cfMap.setView([center.lat, center.lng], 11);
    document.getElementById('cf-hdr').textContent = f.length + ' church' + (f.length !== 1 ? 'es' : '') + ' within ' + radius + ' mi';
    cfToast(f.length ? 'Found ' + f.length + ' church' + (f.length !== 1 ? 'es' : '') : 'No churches found \u2014 try a wider radius');
  } catch(e) { cfToast('Search failed \u2014 check your connection'); }
}

function cfClear() {
  document.getElementById('cfZip').value = '';
  document.getElementById('cfDenom').value = '';
  if (cfCircle) { cfMap.removeLayer(cfCircle); cfCircle = null; }
  cfShowAll();
}

function cfHav(lat1, lng1, lat2, lng2) {
  const R = 3958.8, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  return R * 2 * Math.asin(Math.sqrt(Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2));
}

let cfTT;
function cfToast(msg) {
  const t = document.getElementById('cf-toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(cfTT); cfTT = setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('cfZip').addEventListener('keydown', e => { if (e.key === 'Enter') cfSearch(); });
window.addEventListener('load', cfInitMap);
</script>
